name: nexo-data-pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Lint avec ruff
        run: uv run ruff check .

  test-extraction:
    name: Test scripts d'extraction
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Créer dossiers data
        run: mkdir -p data/raw data/clean logs

      - name: Génération du template Excel Nexo
        run: mkdir -p data/output && uv run python generate_excel_template.py

      - name: Test extract_api.py
        run: uv run python extract_api.py
        continue-on-error: true

      - name: Test extract_scraping.py
        run: uv run python extract_scraping.py
        continue-on-error: true

      - name: Test extract_bdd.py (fallback simulé si pas de BDD)
        run: uv run python extract_bdd.py
        env:
          DATABASE_URL: ""

      - name: Test clean_aggregate.py
        run: uv run python clean_aggregate.py

      - name: Vérifier dataset_final.csv produit
        run: |
          if [ -f "data/clean/dataset_final.csv" ]; then
            echo "✅ dataset_final.csv produit"
            wc -l data/clean/dataset_final.csv
          else
            echo "❌ dataset_final.csv absent"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-output
          path: |
            data/raw/
            data/clean/
